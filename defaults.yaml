default:
  enable: false
  repo:
    enable: false
    debian:
      name: 'deb [arch=amd64] https://pkgs.zabbly.com/incus/stable bookworm main'
      human_name: 'Zabbly Incus repository'
      uri: 'https://pkgs.zabbly.com/incus/stable'
      dist: 'bookworm'
      comps:
        - main
      architecture: amd64
      channel: stable
      key_url: 'https://pkgs.zabbly.com/key.asc'
    redhat:
      name: 'incus-stable'
      baseurl: 'https://pkgs.zabbly.com/incus/stable/rpm/$releasever/$basearch'
      gpgkey: 'https://pkgs.zabbly.com/key.asc'
      enabled: 1
      gpgcheck: 1

  pkg:
    # Main Incus package. Adjust to your distribution (e.g., incus)
    name: incus
    # Extra OS-level dependencies, if any. Override in pillar.
    deps:
      - qemu-kvm
      - lxcfs

  connection:
    type: 'unix'
    socket: /var/lib/incus/unix.socket
    cert_storage:
      # local_files | sdb
      type: local_files
      # local_files: path to certificate/key files
      # sdb: sdb:// URI for certificate/key values
      cert: null
      key: null
      # local_files: true|false|/path/to/ca.crt
      # sdb: sdb:// URI returning true|false|/path|PEM
      verify: true

  # Client TLS certificate pair generation (for remote HTTPS API access)
  client_cert:
    enable: false
    cert_path: /etc/salt/pki/incus/client.crt
    key_path: /etc/salt/pki/incus/client.key
    cn: salt-incus-client
    days: 3650
    curve: P-384

  # Manage client certificate trust in Incus API trust list.
  api_client_trust:
    enable: false
    ensure: present # present|absent
    name: salt-cloud
    cert_path: /etc/salt/pki/incus/client.crt
    # Certificate source priority: cert_sdb -> cert_contents -> cert_source -> cert_path
    cert_sdb: null
    cert_contents: null
    cert_source: null

  global:
    lxcfs:
      enable: false
      modules:
        loadavg: true
        cfs: true
        memory: true
        cpuset: true
        sysinfo: true
        pidfd: true

  service:
    # Name of the systemd service providing Incus daemon.
    name: incus
    enable: true

  trust_store:
    enable: false
    # SDB URI with CA cert content, for example: sdb://vault/incus/ca
    sdb: null
    # Alternative: inline certificate content (PEM)
    contents: null
    # Alternative: source file path for file.managed (salt://, http(s)://, etc.)
    source: null
    # Optional override for destination certificate path
    target: null
    # Optional command override. Defaults:
    # Debian/Ubuntu: update-ca-certificates
    # RedHat: update-ca-trust extract
    update_cmd: null

  images: {}
    # Example structure (override in pillar):
    # ubuntu2204:
    #   alias: ubuntu/22.04
    #   source:
    #     server: https://images.linuxcontainers.org
    #     alias: ubuntu/22.04
    #     protocol: simplestreams
    #   auto_update: true
    #   public: false
    #   description: Ubuntu 22.04 LTS

  instances: {}
    # Example structure (override in pillar):
    # web-container:
    #   instance_type: container
    #   source:
    #     type: image
    #     alias: ubuntu/22.04
    #   config:
    #     limits.cpu: "2"
    #     limits.memory: 2GiB
    #   profiles:
    #     - default
    #   ephemeral: false

  instance_snapshots: {}
    # Example structure (override in pillar):
    # web-before-update:
    #   instance: web-container
    #   name: before-system-update
    #   stateful: false
    #   description: Snapshot before OS update

  storage: {}
    # Example structure (override in pillar):
    # default:
    #   name: default
    #   config:
    #     driver: zfs
    #     source: tank/incus

  networks: {}
    # Example structure (override in pillar):
    # incusbr0:
    #   network_type: bridge
    #   config:
    #     ipv4.address: 10.0.0.1/24
    #     ipv4.nat: "true"
    #     ipv6.address: none

  profiles: {}
    # Example structure (override in pillar):
    # default:
    #   config:
    #     limits.cpu: "2"
    #     limits.memory: 2GiB
    #   devices:
    #     root:
    #       type: disk
    #       path: /
    #       pool: default

  server_settings: {}
    # Example structure (override in pillar):
    # config:
    #   core.https_address: "[::]:8443"
    #   core.trust_password: "changeme"
    #   images.auto_update_cached: "true"
    #   images.auto_update_interval: "12"
    #   images.compression_algorithm: "zstd"

  server_settings_individual: {}
    # Example structure (override in pillar):
    # https_api:
    #   ensure: present
    #   key: core.https_address
    #   value: "[::]:8443"

  cluster: {}
